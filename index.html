<script>
/* ============================================================
   MI NEGOCIO — Prototipo funcional (local-first)
   Módulos: Clientes · Inventario · Compras · Ventas · Vencimientos · Reportes
   Datos guardados en el navegador (localStorage). Listo para

/* ---------- Utilidades ---------- */
const $ = (s, r=document) => r.querySelector(s);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const isoLocal = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const todayISO = () => isoLocal(new Date()); // fecha LOCAL (evita que ventas nocturnas queden con fecha de mañana por UTC)
const fmtMoney = n => new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(+n||0);
const fmtNum = n => new Intl.NumberFormat('es-CO').format(+n||0);
const fmtDate = iso => { if(!iso) return '—'; const [y,m,d]=iso.split('-'); return `${d}/${m}/${y}`; };
const fmtConsec = n => String(n||0).padStart(3,'0');
const daysUntil = iso => { if(!iso) return null; const d=Math.round((new Date(iso)-new Date(todayISO()))/86400000); return d; };
const esc = s => String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
// Solo deja pasar imágenes en formato data:image/... (bloquea valores que rompan el atributo src)
const fotoSrc = f => (typeof f==='string' && /^data:image\/(png|jpe?g|webp|gif);base64,[A-Za-z0-9+/=]+$/.test(f)) ? f : '';

/* ---------- Catálogo de medicamentos (para cargar inventario rápido) ---------- */

/* ---------- Capa de datos (fácil de migrar a Supabase) ---------- */
const store = {
  key:'miNegocio_v1',
  data:null,
  // Normaliza cualquier juego de datos (local o traído de la nube): campos nuevos,
  // arrays garantizados y consecutivo de venta sin huecos ni duplicados.
  migrar(d){
    d.config = Object.assign({ negocio:'Mi Negocio', alertaVencimiento:30, alertaStock:5, nextConsecutivo:1 }, d.config||{});
    ['clientes','productos','compras','ventas','gastos','proveedores'].forEach(k=>{ if(!Array.isArray(d[k])) d[k]=[]; });
    d.productos.forEach(p=>(p.lotes||[]).forEach(l=>{ if(!l.id) l.id=uid(); })); // lotes viejos sin id (previos a la edición por lote)
    const yaAsignados = d.ventas.map(v=>v.consecutivo).filter(Boolean);
    const maxAsignado = yaAsignados.length ? Math.max(...yaAsignados) : 0;
    if(!(d.config.nextConsecutivo > maxAsignado)) d.config.nextConsecutivo = maxAsignado+1; // cubre undefined/NaN
    const sinConsec = d.ventas.filter(v=>!v.consecutivo).sort((a,b)=>(a.creado||0)-(b.creado||0));
    sinConsec.forEach(v=>{ v.consecutivo = d.config.nextConsecutivo++; });
    return d;
  },
  load(){
    try{ this.data = JSON.parse(localStorage.getItem(this.key)) }catch(e){ this.data=null }
    if(!this.data) this.data = { clientes:[], productos:[], compras:[], ventas:[], gastos:[], config:{ negocio:'Mi Negocio', alertaVencimiento:30, alertaStock:5, nextConsecutivo:1 } };
    return this.migrar(this.data);
  },
  save(){ localStorage.setItem(this.key, JSON.stringify(this.data)); if(cloud.ready && cloud.user && !cloud.applying) cloud.push(); },
};
const DB = store.load();

/* ============================================================
   NUBE (Supabase) — login por correo + sincronización + tiempo real
   Estrategia: un documento JSON por usuario (tabla negocio_datos),
   protegido por RLS. localStorage sigue siendo el respaldo offline.
   ============================================================ */
const SUPABASE_URL = 'https://bydyiycguroyozhfuyks.supabase.co';
const SUPABASE_KEY = 'sb_publishable_pneTY66uk2k4WSktBAh5rQ_xg5tiklz';

const cloud = {
  sb:null, user:null, ready:false, status:'off', lastSync:null, chan:null, pushTimer:null, applying:false,
  init(){
    if(!window.supabase || !SUPABASE_URL){ this.status='nolib'; updateCloudBadges(); return; }
    try{ this.sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); }
    catch(e){ this.status='nolib'; updateCloudBadges(); return; }
    this.ready = true; this.status = 'desconectado';
    this.sb.auth.onAuthStateChange((event, session)=>{
      if(event==='PASSWORD_RECOVERY'){ setTimeout(()=>openNuevaPass(), 400); }
      if(session && session.user){
        const nuevo = !this.user || this.user.id !== session.user.id;
        this.user = session.user;
        if(nuevo) this.afterLogin();
      } else {
        this.user = null; this.status = 'desconectado'; this.unsubscribe();
        updateCloudBadges(); if(cuentaAbierta()) openCuenta();
      }
    });
    updateCloudBadges();
  },
  async signUp(email, pass){
    const { data, error } = await this.sb.auth.signUp({ email, password:pass });
    if(error) throw error;
    return data.session ? 'ok' : 'confirm';
  },
  async signIn(email, pass){
    const { error } = await this.sb.auth.signInWithPassword({ email, password:pass });
    if(error) throw error;
    return 'ok';
  },
  async signOut(){ if(this.sb) await this.sb.auth.signOut(); },
  async afterLogin(){
    this.status = 'sync'; updateCloudBadges();
    try{
      const { data, error } = await this.sb.from('negocio_datos').select('data').eq('user_id', this.user.id).maybeSingle();
      if(error) throw error;
      const cd = data && data.data;
      const cloudTiene = cd && ((cd.productos&&cd.productos.length)||(cd.clientes&&cd.clientes.length)||(cd.ventas&&cd.ventas.length)||(cd.compras&&cd.compras.length));
      if(cloudTiene){
        localStorage.setItem('miNegocio_backup', JSON.stringify(DB)); // respaldo antes de traer nube
        this.applyRemote(cd);
      } else {
        await this.push(true); // nube vacía: sube lo local
      }
      this.status = 'ok'; this.lastSync = new Date();
      this.subscribe();
      updateCloudBadges(); if(cuentaAbierta()) openCuenta();
      toast('Sincronizado con la nube ✓');
    }catch(e){ console.error(e); this.status='error'; updateCloudBadges(); if(cuentaAbierta()) openCuenta(); toast('Error al sincronizar','err'); }
  },
  applyRemote(cd){
    this.applying = true;
    Object.keys(DB).forEach(k=>delete DB[k]);
    Object.assign(DB, cd);
    store.migrar(DB); // los datos de la nube pueden venir de una versión anterior de la app
    store.data = DB; store.save();
    this.applying = false;
    render();
  },
  push(now=false){
    if(!this.user || this.applying) return;
    clearTimeout(this.pushTimer);
    const doPush = async ()=>{
      try{
        this.status='sync'; updateCloudBadges();
        const { error } = await this.sb.from('negocio_datos').upsert({ user_id:this.user.id, data:DB, updated_at:new Date().toISOString() });
        if(error) throw error;
        this.status='ok'; this.lastSync=new Date(); updateCloudBadges();
      }catch(e){ console.error(e); this.status='error'; updateCloudBadges(); }
    };
    if(now) return doPush();
    this.pushTimer = setTimeout(doPush, 1200);
  },
  async pull(silencioso=false){
    if(!this.user) return;
    this.status='sync'; updateCloudBadges();
    try{
      const { data, error } = await this.sb.from('negocio_datos').select('data').eq('user_id', this.user.id).maybeSingle();
      if(error) throw error;
      if(data && data.data && JSON.stringify(data.data)!==JSON.stringify(DB)) this.applyRemote(data.data);
      this.status='ok'; this.lastSync=new Date(); updateCloudBadges(); if(cuentaAbierta()) openCuenta();
      if(!silencioso) toast('Datos actualizados desde la nube');
    }catch(e){ console.error(e); this.status='error'; updateCloudBadges(); if(!silencioso) toast('No se pudo actualizar','err'); }
  },
  subscribe(){
    this.unsubscribe();
    try{
      this.chan = this.sb.channel('nd_'+this.user.id)
        .on('postgres_changes', { event:'*', schema:'public', table:'negocio_datos', filter:'user_id=eq.'+this.user.id }, payload=>{
          const nd = payload.new && payload.new.data;
          if(!nd) return;
          if(JSON.stringify(nd) === JSON.stringify(DB)) return; // es nuestro propio cambio
          this.applyRemote(nd);
          this.lastSync = new Date(); updateCloudBadges();
        }).subscribe();
    }catch(e){ console.error(e); }
  },
  unsubscribe(){ if(this.chan){ try{ this.sb.removeChannel(this.chan); }catch(e){} this.chan=null; } }
};

/* ---- Interfaz de la nube ---- */
function cuentaAbierta(){ return !!(modal && modal.title && modal.title.indexOf('Cuenta y sincroniz') >= 0); }
function cloudStatusInfo(){
  if(!cloud.ready) return { icon:'☁️', text:'Sin conexión', hex:'#dbeafe' };
  if(!cloud.user) return { icon:'☁️', text:'Conectar nube', hex:'#dbeafe' };
  if(cloud.status==='sync') return { icon:'🔄', text:'Sincronizando…', hex:'#fbbf24' };
  if(cloud.status==='error') return { icon:'⚠️', text:'Error de sync', hex:'#fb7185' };
  return { icon:'✅', text:'Sincronizado', hex:'#34d399' };
}
function updateCloudBadges(){
  const info = cloudStatusInfo();
  document.querySelectorAll('.cloudBadgeInner').forEach(el=>{ el.textContent = info.icon+' '+info.text; el.style.color = info.hex; });
}
function traducirError(err){
  const m = ((err && err.message) || '').toLowerCase();
  if(m.includes('invalid login')) return 'Correo o contraseña incorrectos.';
  if(m.includes('email not confirmed')) return 'Debes confirmar tu correo (revisa tu bandeja) antes de iniciar sesión.';
  if(m.includes('already') && m.includes('regist')) return 'Ese correo ya tiene cuenta. Usa "Iniciar sesión".';
  if(m.includes('password')) return 'La contraseña debe tener al menos 6 caracteres.';
  if(m.includes('rate')) return 'Demasiados intentos. Espera un momento e intenta de nuevo.';
  return (err && err.message) || 'Ocurrió un error.';
}
function openCuenta(){
  let body;
  if(!cloud.ready){
    body = `<div class="text-center py-4"><div class="text-4xl mb-3">☁️</div>
      <p class="text-sm text-slate-500">No se pudo conectar a la nube (sin internet o no cargó la librería). La app sigue funcionando y guardando en este dispositivo. Reintenta con conexión.</p></div>`;
  } else if(cloud.user){
    const info = cloudStatusInfo();
    body = `
      <div class="bg-slate-50 rounded-xl p-4 mb-4">
        <div class="text-xs text-slate-400">Sesión iniciada</div>
        <div class="font-semibold break-all">${esc(cloud.user.email||'')}</div>
        <div class="text-sm mt-1" style="color:${info.hex}">${info.icon} ${info.text}${cloud.lastSync?` · ${cloud.lastSync.toLocaleTimeString('es-CO')}`:''}</div>
      </div>
      <button onclick="cloudLogout()" class="w-full border border-rose-200 text-rose-600 rounded-xl py-2.5 text-sm hover:bg-rose-50">Cerrar sesión</button>
      <p class="text-[11px] text-slate-400 mt-3">La sincronización es automática: cada cambio se sube solo a la nube y los cambios hechos en otros dispositivos llegan solos a este.</p>`;
  } else {
    body = `
      <p class="text-sm text-slate-500 mb-4">Inicia sesión para sincronizar tus datos entre la computadora y el celular. Si es tu primera vez, escribe correo y contraseña y toca <b>Crear cuenta</b>.</p>
      <form onsubmit="return cloudAuth(event)">
        ${field('Correo',`<input name="email" type="email" required class="${inputCls}" placeholder="tucorreo@ejemplo.com">`)}
        ${field('Contraseña',`<input name="pass" type="password" required minlength="6" class="${inputCls}" placeholder="mínimo 6 caracteres">`)}
        <div id="authMsg" class="text-xs mb-2 min-h-[16px]"></div>
        <div class="flex gap-2">
          <button type="submit" data-mode="signin" class="flex-1 bg-brand hover:bg-brand-700 text-white font-semibold py-2.5 rounded-xl">Iniciar sesión</button>
          <button type="submit" data-mode="signup" class="flex-1 border border-slate-200 hover:bg-slate-50 font-medium py-2.5 rounded-xl">Crear cuenta</button>
        </div>
        <button type="button" onclick="cloudResetPass()" class="w-full text-center text-xs text-brand-700 mt-3 py-1">¿Olvidaste tu contraseña?</button>
      </form>`;
  }
  openModal('☁️ Cuenta y sincronización', body);
}
async function cloudAuth(e){
  e.preventDefault();
  const f = e.target;
  const email = f.email.value.trim(), pass = f.pass.value;
  const mode = (e.submitter && e.submitter.dataset.mode) || 'signin';
  const msg = document.getElementById('authMsg');
  msg.style.color = '#64748b'; msg.textContent = 'Procesando…';
  try{
    if(mode==='signup'){
      const r = await cloud.signUp(email, pass);
      if(r==='confirm'){ msg.style.color='#0d9488'; msg.textContent='Cuenta creada. Te enviamos un correo de confirmación: ábrelo, confirma y luego inicia sesión aquí.'; return false; }
    } else {
      await cloud.signIn(email, pass);
    }
    // onAuthStateChange -> afterLogin refresca la vista y el modal
  }catch(err){ msg.style.color='#e11d48'; msg.textContent = traducirError(err); }
  return false;
}
function cloudPull(){ cloud.pull(); }
async function cloudLogout(){ await cloud.signOut(); toast('Sesión cerrada'); }
async function cloudResetPass(){
  const emailInp = document.querySelector('#modal [name=email]');
  const email = emailInp ? emailInp.value.trim() : '';
  const msg = document.getElementById('authMsg');
  if(!email){ if(msg){ msg.style.color='#e11d48'; msg.textContent='Escribe tu correo arriba y vuelve a tocar este enlace.'; } return; }
  try{
    await cloud.sb.auth.resetPasswordForEmail(email, { redirectTo: location.origin + location.pathname });
    if(msg){ msg.style.color='#0d9488'; msg.textContent='Listo: revisa tu correo y abre el enlace para crear una nueva contraseña.'; }

const getProducto = id => DB.productos.find(p=>p.id===id);
const getCliente = id => DB.clientes.find(c=>c.id===id);
const getProveedor = id => DB.proveedores.find(p=>p.id===id);

// Stock total de un producto = suma de sus lotes
const stockDe = p => (p.lotes||[]).reduce((s,l)=>s+(+l.cantidad||0),0);

// Descontar cantidad de un producto por FIFO según vencimiento (los que vencen primero salen primero)
function descontarStock(prodId, cantidad){
  const p = getProducto(prodId); if(!p) return;
  let restante = cantidad;
  const lotes = (p.lotes||[]).slice().sort((a,b)=>{
    const av=a.venc||'9999', bv=b.venc||'9999'; return av<bv?-1:av>bv?1:0;
  });
  for(const l of lotes){
    if(restante<=0) break;
    const usar = Math.min(l.cantidad, restante);
    l.cantidad -= usar; restante -= usar;
  }
  p.lotes = (p.lotes||[]).filter(l=>l.cantidad>0);
}
// Agregar stock (nuevo lote)
function agregarLote(prodId, cantidad, venc, costo, lote){
  const p = getProducto(prodId); if(!p) return;
  p.lotes = p.lotes||[];
  p.lotes.push({ id:uid(), cantidad:+cantidad, venc:venc||'', costo:+costo||p.precioCompra||0, lote:lote||'' });
}
// Edición manual de un lote existente (ajuste de cantidad, vencimiento, código de lote o costo)
function openLote(prodId, loteId){
  const p = getProducto(prodId); if(!p) return;
  const l = (p.lotes||[]).find(x=>x.id===loteId); if(!l) return;
  openModal('Ajustar lote',
    `<div class="text-sm text-slate-400 mb-3">${esc(p.nombre)}</div>
     <form onsubmit="return saveLote(event,'${prodId}','${loteId}')">
      ${field('Cantidad en stock *',`<input name="cantidad" type="number" min="0" step="any" required value="${l.cantidad}" class="${inputCls}">`)}
      ${field('Lote (código)',`<input name="lote" value="${esc(l.lote||'')}" class="${inputCls}" placeholder="Lote del medicamento">`)}
      ${field('Vencimiento',`<input name="venc" type="date" value="${l.venc||''}" class="${inputCls}">`)}
      ${field('Costo unitario',`<input name="costo" type="number" min="0" step="any" value="${l.costo||''}" class="${inputCls}">`)}
      <div class="flex gap-2 mt-4">
        <button type="submit" class="flex-1 bg-brand hover:bg-brand-700 text-white font-semibold py-2.5 rounded-xl">Guardar</button>
        <button type="button" onclick="delLote('${prodId}','${loteId}')" class="px-4 py-2.5 rounded-xl border border-rose-200 text-rose-600 text-sm">Eliminar lote</button>
      </div>
     </form>`);
}
function saveLote(e,prodId,loteId){
  e.preventDefault(); const f=e.target;
  const p=getProducto(prodId); if(!p) return false;
  const l=(p.lotes||[]).find(x=>x.id===loteId); if(!l) return false;
  const n=+f.cantidad.value; if(isNaN(n)||n<0){ toast('Cantidad inválida','err'); return false; }
  l.cantidad=n; l.lote=f.lote.value.trim(); l.venc=f.venc.value; l.costo=+f.costo.value||0;
  p.lotes=(p.lotes||[]).filter(x=>x.cantidad>0);
  store.save(); closeModal(); render(); toast('Lote actualizado');
  return false;
}
function delLote(prodId, loteId){
  if(!confirm('¿Eliminar este lote? Se quitará su cantidad del stock.')) return;
  const p=getProducto(prodId); if(!p) return;
  p.lotes=(p.lotes||[]).filter(x=>x.id!==loteId);
  store.save(); closeModal(); render(); toast('Lote eliminado');
}

function toast(msg, type='ok'){
  const t = document.createElement('div');
  t.className = `fixed z-50 bottom-6 left-1/2 -translate-x-1/2 px-4 py-2.5 rounded-xl text-sm font-medium shadow-lg text-white ${type==='ok'?'bg-teal-600':'bg-rose-600'}`;
  // Anuncio a lectores de pantalla (4.1.3): estado -> polite, error -> assertive
  t.setAttribute('role', type==='ok'?'status':'alert');
  t.setAttribute('aria-live', type==='ok'?'polite':'assertive');
  t.textContent = msg; document.body.appendChild(t);
  setTimeout(()=>{ t.style.transition='opacity .3s'; t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 1800);
}

// Créditos con fecha límite a 5 días o menos (o ya vencida):
// - 'cobrar': clientes con saldo pendiente por cobrar
// - 'pagar': proveedores a los que les debo
function creditosPorVencer(){
  const items=[];
  DB.clientes.forEach(c=>{
    if(!(c.saldo>0)) return;
    const vence=(c.movs||[]).filter(m=>m.tipo==='fiado'&&m.vence).map(m=>m.vence).sort()[0];
    if(!vence) return;
    const d=daysUntil(vence);
    if(d!==null && d<=5) items.push({ tipo:'cobrar', id:c.id, nombre:c.nombre, negocio:c.negocio||'', monto:c.saldo, vence, d });
  });
  (DB.proveedores||[]).forEach(p=>{
    if(!(p.saldo>0)) return;
    const vence=(p.movs||[]).filter(m=>m.tipo==='credito'&&m.vence).map(m=>m.vence).sort()[0];
    if(!vence) return;
    const d=daysUntil(vence);
    if(d!==null && d<=5) items.push({ tipo:'pagar', id:p.id, nombre:p.nombre, negocio:p.negocio||'', monto:p.saldo, vence, d });
  });
  items.sort((a,b)=>a.d-b.d);
  return items;
}

// Solo lotes con existencias cuyo vencimiento cae dentro del rango de alerta (o ya vencidos)
function alertsCount(){
  return DB.productos.reduce((s,p)=> s + (p.lotes||[]).filter(l=>{
    if(!l.venc || !(l.cantidad>0)) return false;
    const d=daysUntil(l.venc); return d!==null && d<=DB.config.alertaVencimiento;
  }).length, 0);
}

const listFilters = {};
function applyListFilter(id){
  const st = listFilters[id] || {q:'',desde:'',hasta:''};
  const cont = document.getElementById(id); if(!cont) return;
  let visible = 0;
  cont.querySelectorAll('[data-search]').forEach(el=>{
    let ok = el.getAttribute('data-search').includes(st.q);
    if(ok && (st.desde||st.hasta)){
      const f = el.getAttribute('data-fecha')||'';
      if(!f) ok=false;
      else{ if(st.desde && f<st.desde) ok=false; if(st.hasta && f>st.hasta) ok=false; }
    }
    el.style.display = ok ? '' : 'none';
    if(ok) visible++;
  });
  const em = document.getElementById(id+'-empty');
  if(em) em.style.display = visible ? 'none' : '';
}

let fotoTmp = '';
function onFoto(input){
  const f = input.files && input.files[0]; if(!f) return;
  if(!f.type.startsWith('image/')) return toast('Selecciona una imagen','err');
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      const max = 320, scale = Math.min(1, max/Math.max(img.width,img.height));
      const c = document.createElement('canvas');
      c.width = Math.round(img.width*scale); c.height = Math.round(img.height*scale);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      fotoTmp = c.toDataURL('image/jpeg', 0.7);
      const area = document.getElementById('fotoArea'); if(area) area.innerHTML = fotoAreaInner();
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(f);
}

  const f = input.files && input.files[0]; if(!f) return;
  const okTipo = f.type.startsWith('image/') || f.type==='application/pdf';
  if(!okTipo) return toast('Solo se admiten imágenes o PDF','err');
  if(f.size > 6*1024*1024) return toast('El archivo es muy pesado (máx. 6MB)','err');
  const reader = new FileReader();
  reader.onload = () => cb({ name:f.name, tipo:f.type, data:reader.result });
  reader.readAsDataURL(f);
}

    return `<button type="button" onmousedown="catPick(${i})" class="w-full text-left px-3 py-2 text-sm hover:bg-brand-50 border-b border-slate-50 last:border-0 flex items-center justify-between gap-2">

      ${existe?'<span class="text-[10px] text-slate-300 shrink-0">ya existe</span>':''}</button>`;
  }).join('');
  drop.classList.remove('hidden');
}
function catPick(i){
  const inp = document.getElementById('prodNombre'); if(!inp) return;
  inp.value = catMatches[i] || inp.value;
  const drop = document.getElementById('catDrop'); if(drop) drop.classList.add('hidden');
  const cat = document.querySelector('[name=categoria]'); if(cat && !cat.value) cat.value = 'Medicamento';
}
function catBlur(){ setTimeout(()=>{ const d=document.getElementById('catDrop'); if(d) d.classList.add('hidden'); }, 150); }
function fotoAreaInner(){
  return fotoTmp

function viewDashboard(){
  const hoy = todayISO();
  const ventasHoy = DB.ventas.filter(v=>v.fecha===hoy);
  const totalHoy = ventasHoy.reduce((s,v)=>s+v.total,0);
  const totalMes = DB.ventas.filter(v=>v.fecha.slice(0,7)===hoy.slice(0,7)).reduce((s,v)=>s+v.total,0);

  const valorInv = DB.productos.reduce((s,p)=> s + stockDe(p)*(p.precioVenta||0), 0);
  const bajoStock = DB.productos.filter(p=> stockDe(p) <= DB.config.alertaStock);

      <div class="card p-4 mb-4 border-l-4 border-amber-400">
        <h3 class="font-semibold mb-2">🔔 Créditos por vencer <span class="text-xs font-normal text-slate-400">(a 5 días o menos)</span></h3>
        <ul class="space-y-2">${creditos.map(x=>`

            <button onclick="${x.tipo==='cobrar'?`openEstadoCuenta('${x.id}')`:`openEstadoCuentaProv('${x.id}')`}" class="min-w-0 text-left flex-1 hover:underline">
              <span class="font-medium">${x.tipo==='cobrar'?'💰 Cobrar a':'💸 Pagar a'} ${esc(x.nombre)}</span>${x.negocio?` <span class="text-slate-400">· ${esc(x.negocio)}</span>`:''}
              <span class="text-slate-400">· ${fmtMoney(x.monto)}</span>
            </button>
            <span class="shrink-0 text-xs font-semibold ${x.d<0?'text-rose-600':'text-amber-600'}">${x.d<0?`Venció hace ${-x.d}d`:x.d===0?'Vence hoy':`En ${x.d} día(s)`} · ${fmtDate(x.vence)}</span>
          </li>`).join('')}</ul>
      </div>` : '';
  return pageHead(`Hola 👋`, new Date().toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long'}),
      btnGhost('🧾 Cierre','openCierre()') + btnPrimary('+ Nueva venta','openVenta()'))
    + notifCreditos
    + `<div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-5">
        ${kpi('Ventas de hoy', fmtMoney(totalHoy), `${ventasHoy.length} venta(s)`,'text-teal-600')}
        ${kpi('Ventas del mes', fmtMoney(totalMes), `Ganancia: ${fmtMoney(gananciaMes)}`)}
        ${kpi('Por cobrar (crédito)', fmtMoney(fiadoTotal), `${DB.clientes.filter(c=>c.saldo>0).length} cliente(s)`,'text-amber-600')}
        ${kpi('Valor inventario', fmtMoney(valorInv), `${DB.productos.length} producto(s)`)}
      </div>
      <div class="grid md:grid-cols-2 gap-4">
        <div class="card p-4">
          <div class="flex items-center justify-between mb-3"><h3 class="font-semibold">⏰ Por vencer</h3><button onclick="go('vencimientos')" class="text-xs text-brand-700 font-medium">Ver todo</button></div>
          ${porVencer.length? `<ul class="space-y-2">${porVencer.slice(0,5).map(({p,l,d})=>`
            <li class="flex items-center justify-between text-sm">
              <span class="truncate">${esc(p.nombre)} <span class="text-slate-400">·${l.cantidad}u</span></span>
              <span class="shrink-0 text-xs font-medium ${d<0?'text-rose-600':d<=7?'text-amber-600':'text-slate-500'}">${d<0?`Vencido`:d===0?'Hoy':`${d}d`} · ${fmtDate(l.venc)}</span>
            </li>`).join('')}</ul>` : `<p class="text-sm text-slate-400 py-4 text-center">Sin productos próximos a vencer 🎉</p>`}
        </div>
        <div class="card p-4">
          <div class="flex items-center justify-between mb-3"><h3 class="font-semibold">⚠️ Stock bajo</h3><button onclick="openReposicion()" class="text-xs text-brand-700 font-medium">📦 Pedido sugerido</button></div>
          ${bajoStock.length? `<ul class="space-y-2">${bajoStock.slice(0,5).map(p=>`
            <li class="flex items-center justify-between text-sm">
              <span class="truncate">${esc(p.nombre)}</span>

let invFiltro = { desde:'', hasta:'' };
function onInvFecha(which,val){ invFiltro[which]=val; renderView(); }
function invFiltroBar(){

    <label class="text-xs text-slate-500">Vence desde<input type="date" value="${invFiltro.desde}" onchange="onInvFecha('desde',this.value)" class="${inputCls} mt-1"></label>

    ${(invFiltro.desde||invFiltro.hasta)?`<button onclick="invFiltro={desde:'',hasta:''};renderView()" class="text-xs text-rose-500 border border-rose-200 rounded-lg px-3 py-2.5 h-fit">Limpiar fechas</button>`:''}
  </div>`;

// Botones de acción de la tabla de inventario: ícono + etiqueta clara + área tocable cómoda
const btnEditarProd = pid => `<button onclick="openProducto('${pid}')" title="Editar datos del producto" class="inline-flex items-center gap-1 text-xs font-medium text-brand-700 px-2.5 py-2 rounded-lg hover:bg-brand-50">✏️ Editar</button>`;
const btnAjustarLote = (pid,lid) => `<button onclick="openLote('${pid}','${lid}')" title="Ajustar stock del lote" class="inline-flex items-center gap-1 text-xs font-medium text-teal-700 px-2.5 py-2 rounded-lg hover:bg-teal-50">📦 Ajustar</button>`;
function viewInventario(){
  const filtroActivo = !!(invFiltro.desde||invFiltro.hasta);
  const ps = DB.productos.slice().sort((a,b)=>a.nombre.localeCompare(b.nombre));
  let mostrados = 0;
  const filas = ps.map(p=>{
    const bajo = stockDe(p)<=DB.config.alertaStock;
    const search = sdata(p.nombre+' '+(p.categoria||'')+' '+(p.lotes||[]).map(l=>l.lote||'').join(' '));
    // Lotes ordenados del más próximo a vencer al más lejano (sin fecha = al final)
    let lotes = (p.lotes||[]).filter(l=>l.cantidad>0).slice().sort((a,b)=>{
      const av=a.venc||'9999-99-99', bv=b.venc||'9999-99-99'; return av<bv?-1:av>bv?1:0;
    });
    if(filtroActivo){
      lotes = lotes.filter(l=> l.venc && (!invFiltro.desde||l.venc>=invFiltro.desde) && (!invFiltro.hasta||l.venc<=invFiltro.hasta));
      if(!lotes.length) return '';
    }
    mostrados++;
    const st = filtroActivo ? lotes.reduce((s,l)=>s+l.cantidad,0) : stockDe(p);
    const nombreCell = `<div class="flex items-center gap-3">
        ${fotoSrc(p.foto)?`<img src="${fotoSrc(p.foto)}" alt="" class="w-10 h-10 rounded-lg object-cover border border-slate-100 shrink-0">`:`<div class="w-10 h-10 rounded-lg bg-slate-100 grid place-items-center text-slate-300 shrink-0">📦</div>`}
        <div class="min-w-0"><div class="font-medium truncate">${esc(p.nombre)}</div><div class="text-xs text-slate-400 truncate">${esc(p.categoria||'Sin categoría')}${lotes.length===1&&lotes[0].lote?` · Lote ${esc(lotes[0].lote)}`:''}${lotes.length>1?` · ${lotes.length} lotes`:''}</div></div>
      </div>`;
    if(lotes.length<=1){
      const prox = lotes[0]?.venc;
      return `<tr data-search="${search}" class="border-t border-slate-100 hover:bg-slate-50">
        <td class="p-3">${nombreCell}</td>
        <td class="p-3 text-right whitespace-nowrap">${fmtMoney(p.precioVenta)}</td>
        <td class="p-3 text-center"><span class="font-semibold ${bajo?(st===0?'text-rose-600':'text-amber-600'):''}">${st}</span> <span class="text-xs text-slate-400">${esc(p.unidad||'u')}</span></td>
        <td class="p-3 text-center text-xs ${prox&&daysUntil(prox)<=DB.config.alertaVencimiento?'text-amber-600 font-medium':'text-slate-400'}">${prox?fmtDate(prox):'—'}</td>
        <td class="p-2"><div class="flex items-center justify-end gap-1">${btnEditarProd(p.id)}${lotes[0]?btnAjustarLote(p.id,lotes[0].id):''}</div></td>
      </tr>`;
    }
    // Varios lotes: fila del producto (stock total) + una fila por lote, ordenadas por vencimiento
    const header = `<tr data-search="${search}" class="border-t border-slate-100 hover:bg-slate-50 bg-slate-50/60">
        <td class="p-3">${nombreCell}</td>
        <td class="p-3 text-right whitespace-nowrap">${fmtMoney(p.precioVenta)}</td>
        <td class="p-3 text-center"><span class="font-semibold ${bajo?(st===0?'text-rose-600':'text-amber-600'):''}">${st}</span> <span class="text-xs text-slate-400">${esc(p.unidad||'u')} total</span></td>
        <td class="p-3 text-center text-xs text-slate-400">—</td>
        <td class="p-2"><div class="flex justify-end">${btnEditarProd(p.id)}</div></td>
      </tr>`;
    const subFilas = lotes.map(l=>{
      const d = daysUntil(l.venc);
      const urgente = l.venc && d!==null && d<=DB.config.alertaVencimiento;
      return `<tr data-search="${search}" class="border-t border-slate-50">
        <td class="p-2 pl-14 text-xs text-slate-400">↳ Lote</td>
        <td></td>
        <td class="p-2 text-center text-xs ${urgente?'text-amber-600 font-medium':'text-slate-500'}">${l.cantidad} ${esc(p.unidad||'u')}</td>
        <td class="p-2 text-center text-xs ${d!==null&&d<0?'text-rose-600 font-medium':urgente?'text-amber-600 font-medium':'text-slate-400'}">${l.venc?fmtDate(l.venc):'sin fecha'}${l.lote?` <span class="text-slate-300">· L:${esc(l.lote)}</span>`:''}</td>
        <td class="p-2"><div class="flex justify-end">${btnAjustarLote(p.id,l.id)}</div></td>
      </tr>`;
    }).join('');
    return header + subFilas;
  }).join('');
  return pageHead('Inventario', `${filtroActivo?mostrados+' de '+ps.length:ps.length} producto(s) · Valor venta: ${fmtMoney(DB.productos.reduce((s,p)=>s+stockDe(p)*p.precioVenta,0))}`, btnGhost('📊 Exportar Excel','exportInventarioExcel()') + btnGhost('📦 Reposición','openReposicion()') + btnPrimary('+ Producto','openProducto()'))
    + (ps.length? searchBar('listInventario','Buscar por nombre, categoría o lote…') + invFiltroBar() + `<div class="card overflow-x-auto"><table class="w-full text-sm">
        <thead><tr class="text-xs text-slate-400 text-left"><th class="p-3 font-medium">Producto</th><th class="p-3 font-medium text-right">Precio</th><th class="p-3 font-medium text-center">Stock</th><th class="p-3 font-medium text-center">Vence</th><th></th></tr></thead>
        <tbody id="listInventario">${filas}</tbody></table></div>` + noRes('listInventario') + (filtroActivo && !mostrados? empty('🔍','Ningún lote vence en ese rango de fechas.') : '') : empty('📦','Sin productos. Crea el primero para empezar a vender.'));
}

/* ---------- VENCIMIENTOS ---------- */
function viewVencimientos(){
  const items = [];
  DB.productos.forEach(p=>(p.lotes||[]).forEach(l=>{ if(l.venc){ const d=daysUntil(l.venc); items.push({p,l,d}); } }));
  items.sort((a,b)=>a.d-b.d);
  const vencidos = items.filter(i=>i.d<0);
  const criticos = items.filter(i=>i.d>=0 && i.d<=7);
  const proximos = items.filter(i=>i.d>7 && i.d<=DB.config.alertaVencimiento);
  const grupo = (titulo,color,arr)=> arr.length? `
    <div class="mb-5">
      <h3 class="text-sm font-semibold mb-2 ${color}">${titulo} (${arr.length})</h3>
      <div class="space-y-2">${arr.map(({p,l,d})=>`
        <div data-search="${sdata(p.nombre+' '+(p.categoria||''))}" class="card p-3 flex items-center justify-between gap-3">
          <div><div class="font-medium">${esc(p.nombre)}</div><div class="text-xs text-slate-400">${l.cantidad} ${esc(p.unidad||'u')} · Lote vence ${fmtDate(l.venc)}</div></div>
          <span class="text-xs font-semibold shrink-0 ${d<0?'text-rose-600':d<=7?'text-amber-600':'text-slate-500'}">${d<0?`Vencido hace ${-d}d`:d===0?'Vence hoy':`En ${d} días`}</span>
        </div>`).join('')}</div>
    </div>`:'';
  const grupos = grupo('🔴 Vencidos','text-rose-600',vencidos)+grupo('🟠 Críticos (≤7 días)','text-amber-600',criticos)+grupo('🟡 Próximos','text-yellow-600',proximos);
  return pageHead('Vencimientos', `Alertas a ${DB.config.alertaVencimiento} días (configurable en Ajustes)`)
    + (items.length? (grupos? searchBar('listVenc','Buscar producto…') + `<div id="listVenc">${grupos}</div>` + noRes('listVenc') : empty('✅','Nada por vencer en el rango de alerta.'))
       : empty('⏰','No hay productos con fecha de vencimiento. Agrégala al comprar o editar un producto.'));
}

/* ---------- REPORTES ---------- */
let repFiltro = { desde:'', hasta:'' };
function onRepFecha(which,val){ repFiltro[which]=val; renderView(); }
function viewReportes(){
  const hoy=todayISO(), mes=hoy.slice(0,7);
  const filtro = !!(repFiltro.desde||repFiltro.hasta);
  const enRango = f => (!repFiltro.desde||f>=repFiltro.desde) && (!repFiltro.hasta||f<=repFiltro.hasta);
  // Sin filtro de fechas: el mes actual. Con filtro: el rango elegido.
  const ventasMes = filtro? DB.ventas.filter(v=>enRango(v.fecha)) : DB.ventas.filter(v=>v.fecha.slice(0,7)===mes);
  const totalMes = ventasMes.reduce((s,v)=>s+v.total,0);
  const gananciaMes = ventasMes.reduce((s,v)=>s+(v.ganancia||0),0);
  const comprasMes = (filtro? DB.compras.filter(c=>enRango(c.fecha)) : DB.compras.filter(c=>c.fecha.slice(0,7)===mes)).reduce((s,c)=>s+c.total,0);

  // Top productos vendidos (por cantidad, en el periodo)
  const conteo = {};

  return pageHead('Reportes', subtitulo, btnGhost('💸 Gastos','go(\'gastos\')') + btnGhost('🧾 Cierre', filtro?`openCierre('${repFiltro.desde}','${repFiltro.hasta}')`:'openCierre()'))
    + `<div class="flex flex-wrap items-end gap-2 mb-4">
        <label class="text-xs text-slate-500">Desde<input type="date" value="${repFiltro.desde}" onchange="onRepFecha('desde',this.value)" class="${inputCls} mt-1"></label>
        <label class="text-xs text-slate-500">Hasta<input type="date" value="${repFiltro.hasta}" onchange="onRepFecha('hasta',this.value)" class="${inputCls} mt-1"></label>
        ${filtro?`<button onclick="repFiltro={desde:'',hasta:''};renderView()" class="text-xs text-rose-500 border border-rose-200 rounded-lg px-3 py-2.5 h-fit">Limpiar fechas</button>`:''}
      </div>
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-5">
        ${kpi('💵',filtro?'Ventas del periodo':'Ventas del mes',fmtMoney(totalMes),'text-teal-600')}
        ${kpi('📈','Ganancia estimada',fmtMoney(gananciaMes),'text-brand-700')}
        ${kpi('🛒',filtro?'Compras del periodo':'Compras del mes',fmtMoney(comprasMes),'text-slate-700')}
        ${kpi('💸',filtro?'Gastos del periodo':'Gastos del mes',fmtMoney(gastosMes),'text-rose-600')}
      </div>
      <div class="grid md:grid-cols-2 gap-4">
        <div class="card p-4">
          <h3 class="font-semibold mb-4">Ventas últimos 7 días</h3>
          <div class="flex items-end gap-2 h-40">${dias.map(d=>`
            <div class="flex-1 flex flex-col items-center gap-1">
              <div class="text-[10px] text-slate-400">${d.total?fmtNum(Math.round(d.total/1000))+'k':''}</div>
              <div class="w-full bg-brand-100 rounded-t-md" style="height:${Math.max(4,d.total/maxDia*130)}px"><div class="w-full h-full bg-brand rounded-t-md opacity-80"></div></div>
              <div class="text-[10px] text-slate-400 capitalize">${d.label}</div>
            </div>`).join('')}</div>
        </div>
        <div class="card p-4">
          <h3 class="font-semibold mb-3">Más vendidos ${filtro?'(periodo)':'(mes)'}</h3>
          ${top.length? `<div class="space-y-2.5">${top.map(t=>`
            <div>
              <div class="flex justify-between text-sm mb-1"><span class="truncate">${esc(t.p.nombre)}</span><span class="text-slate-400 shrink-0 ml-2">${t.cant}u · ${fmtMoney(t.total)}</span></div>
              <div class="h-2 bg-slate-100 rounded-full overflow-hidden"><div class="h-full bg-teal-500 rounded-full" style="width:${t.cant/maxCant*100}%"></div></div>
            </div>`).join('')}</div>` : `<p class="text-sm text-slate-400 py-6 text-center">Sin ventas este mes.</p>`}
        </div>
      </div>`;
}

let modalLastFocus=null;
function openModal(title, bodyHtml, size='md'){
  // Guarda el foco actual (el disparador) para devolverlo al cerrar — accesibilidad de teclado/lector
  if(!modal) modalLastFocus = document.activeElement;
  modal = { title, bodyHtml, size };
  renderModal();
}
function closeModal(){
  modal=null; const m=$('#modal'); if(m) m.remove();
  if(modalLastFocus && typeof modalLastFocus.focus==='function'){ try{ modalLastFocus.focus(); }catch(e){} }
  modalLastFocus=null;
}
// Elementos enfocables visibles dentro de un contenedor (para atrapar el foco en el modal)
function focusablesEn(el){
  return [...el.querySelectorAll('a[href],button:not([disabled]),input:not([disabled]),select:not([disabled]),textarea:not([disabled]),[tabindex]:not([tabindex="-1"])')].filter(x=>x.offsetParent!==null);
}
function modalKeydown(e){
  // Nota: NO se cierra con Escape a propósito (evita perder el avance sin querer). Cierre solo con × o guardar.
  if(e.key!=='Tab') return;
  const el=$('#modal'); if(!el) return;
  const foci=focusablesEn(el); if(!foci.length) return;
  const first=foci[0], last=foci[foci.length-1];
  if(e.shiftKey && document.activeElement===first){ e.preventDefault(); last.focus(); }
  else if(!e.shiftKey && document.activeElement===last){ e.preventDefault(); first.focus(); }
}
function renderModal(){
  const old=$('#modal'); if(old) old.remove();
  const w = {sm:'max-w-sm',md:'max-w-lg',lg:'max-w-2xl'}[modal.size]||'max-w-lg';
  const el=document.createElement('div');
  el.id='modal';
  el.className='fixed inset-0 z-40 flex items-end md:items-center justify-center bg-black/40 p-0 md:p-4';
  el.innerHTML=`<div role="dialog" aria-modal="true" aria-labelledby="modalTitle" class="bg-white w-full ${w} rounded-t-3xl md:rounded-2xl max-h-[92vh] overflow-y-auto fade">
      <div class="sticky top-0 bg-white flex items-center justify-between px-5 py-4 border-b border-slate-100">
        <h3 id="modalTitle" class="font-bold text-lg">${modal.title}</h3>
        <button onclick="closeModal()" aria-label="Cerrar" class="text-slate-500 text-2xl leading-none w-9 h-9 grid place-items-center hover:bg-slate-100 rounded-lg">×</button>
      </div>
      <div class="p-5">${modal.bodyHtml}</div>
    </div>`;
  // NO se cierra al hacer clic fuera del modal: evita perder el avance por un clic accidental.
  // El modal solo se cierra con la × o al guardar/registrar.
  el.addEventListener('keydown', modalKeydown);
  document.body.appendChild(el);
  // Lleva el foco al primer campo/botón del modal (mejor: el primer input; si no, el diálogo)
  const foci=focusablesEn(el);
  const primero = foci.find(x=>/^(INPUT|SELECT|TEXTAREA)$/.test(x.tagName)) || foci[0];
  if(primero) primero.focus();
}

  e.preventDefault(); const f=e.target;

function cobrarWA(id){
  const c=getCliente(id); if(!c || !(c.saldo>0)) return;
  let tel=(c.telefono||'').replace(/\D/g,'');
  if(tel.length===10 && tel.startsWith('3')) tel='57'+tel; // celular colombiano
  // fecha límite: el vencimiento más próximo de los créditos registrados
  const vences=(c.movs||[]).filter(m=>m.tipo==='fiado'&&m.vence).map(m=>m.vence).sort();
  const vence=vences[0]||'';
  const txt=`Hola ${c.nombre} 👋, te saludamos de *${DB.config.negocio}*. Te recordamos que tienes un saldo pendiente de *${fmtMoney(c.saldo)}*${vence?` con fecha límite de pago el *${fmtDate(vence)}*`:''}. Cuando puedas pasar a ponerte al día, con gusto te atendemos. ¡Gracias! 🙏`;
  window.open('https://wa.me/'+(tel||'')+'?text='+encodeURIComponent(txt),'_blank');
}
function estadoCuentaTexto(c){
  const movs=(c.movs||[]).slice().sort((a,b)=> a.fecha<b.fecha?-1: a.fecha>b.fecha?1: 0);
  const lineas=movs.map(m=>{
    if(m.tipo==='fiado'){
      const prods=(m.items||[]).map(i=>`${i.nombre} x${i.cant}`).join(', ');
      return `• ${fmtDate(m.fecha)} — Crédito${prods?`: ${prods}`:''} — ${fmtMoney(m.monto)}${m.vence?` (pagar antes del ${fmtDate(m.vence)})`:''}`;
    }
    if(m.tipo==='abono') return `• ${fmtDate(m.fecha)} — Abono recibido — −${fmtMoney(m.monto)}`;
    return `• ${fmtDate(m.fecha)} — Venta anulada — −${fmtMoney(m.monto)}`;
  });
  return `📄 *Estado de cuenta*\n*${DB.config.negocio}*\n\nCliente: *${c.nombre}*${c.negocio?`\nNegocio: ${c.negocio}`:''}\n\n${lineas.join('\n')}\n\n*Saldo actual: ${fmtMoney(c.saldo)}*`;
}
function waEstadoCuenta(id){

function abonar(id){
  const c=getCliente(id);
  const val=prompt(`${c.nombre} debe ${fmtMoney(c.saldo)}.\n¿Cuánto abona?`, c.saldo);

  c.movs=c.movs||[]; c.movs.push({fecha:todayISO(),tipo:'abono',monto:n});

function saveAbonoProv(e,id){
  e.preventDefault(); const f=e.target;
  const p=getProveedor(id); if(!p) return false;
  const n=+f.monto.value; if(isNaN(n)||n<=0){ toast('Monto inválido','err'); return false; }
  if(!abonoSoporteTmp.data){ toast('Adjunta el soporte de pago antes de registrar','err'); return false; }
  const medioPago=f.medioPago.value;
  p.saldo=Math.max(0,(p.saldo||0)-n);
  p.movs=p.movs||[]; p.movs.push({fecha:todayISO(),tipo:'abono',monto:n,medioPago,soporte:{...abonoSoporteTmp}});
  abonoSoporteTmp={name:'',tipo:'',data:''};
  store.save(); closeModal(); render(); toast('Pago registrado');
  return false;
}

function saveProducto(e,id){
  e.preventDefault(); const f=e.target;
  const obj={ nombre:f.nombre.value.trim(), categoria:f.categoria.value.trim(), unidad:f.unidad.value.trim()||'u', precioCompra:+f.precioCompra.value||0, precioVenta:+f.precioVenta.value||0, foto:fotoTmp };
  if(id){ Object.assign(getProducto(id),obj); }
  else {
    const p={id:uid(),lotes:[],...obj}; DB.productos.push(p);
    const st=+f.stockIni.value||0; if(st>0) agregarLote(p.id,st,f.vencIni.value,obj.precioCompra,f.loteIni.value.trim());
  }
  store.save(); closeModal(); render(); toast('Producto guardado');
}
function delProducto(id){ if(!confirm('¿Eliminar este producto?'))return; DB.productos=DB.productos.filter(p=>p.id!==id); store.save(); closeModal(); render(); toast('Producto eliminado'); }
function ajustarStock(id){
  const p=getProducto(id); const val=prompt(`Stock actual: ${stockDe(p)}.\nEscribe el nuevo stock total:`, stockDe(p));
  if(val===null)return; const n=+val; if(isNaN(n)||n<0)return toast('Valor inválido','err');
  const diff=n-stockDe(p);
  if(diff>0) agregarLote(id,diff,'',p.precioCompra);
  else if(diff<0) descontarStock(id,-diff);
  store.save(); openProducto(id); render(); toast('Stock ajustado');
}

/* ----- Venta ----- */
let carritoV=[];
function openVenta(){ carritoV=[]; showVenta(); }
function showVenta(){ openModal('Nueva venta', ventaBody(), 'lg'); }
function ventaBody(){
  const total=carritoV.reduce((s,i)=>s+i.cant*i.precio,0);
  const disponibles=DB.productos.filter(p=>stockDe(p)>0);
  const opts=disponibles.map(p=>`<option value="${p.id}">${esc(p.nombre)} — ${fmtMoney(p.precioVenta)} (${stockDe(p)} ${esc(p.unidad||'u')})</option>`).join('');

    return `<div class="text-center py-8">

      <p class="text-slate-500 mb-1 font-medium">No hay productos con existencias</p>

    </div>
    <div class="flex gap-2 mb-3">
      <input id="vPrecio" type="number" min="0" step="any" placeholder="Precio de venta" aria-label="Precio de venta" class="${inputCls} flex-1" title="Precio (editable para ofrecer una tarifa especial o descuento)">
      <button type="button" onclick="addCarrito()" class="bg-brand text-white px-4 rounded-xl font-semibold shrink-0">+ Agregar</button>
    </div>
    ${carritoV.length? `<div class="space-y-2 mb-3">${carritoV.map((i,idx)=>{const p=getProducto(i.prodId); const especial=p&&i.precio!==p.precioVenta; return `
      <div class="flex items-center gap-2 bg-slate-50 rounded-xl p-2.5">
        ${fotoSrc(p.foto)?`<img src="${fotoSrc(p.foto)}" alt="" class="w-9 h-9 rounded-lg object-cover shrink-0">`:''}
        <div class="flex-1 min-w-0"><div class="text-sm font-medium truncate">${esc(p.nombre)}</div><div class="text-xs text-slate-400">${i.cant} × ${fmtMoney(i.precio)} ${especial?'<span class="text-amber-600 font-medium">· precio especial</span>':''}</div></div>
        <div class="text-sm font-semibold">${fmtMoney(i.cant*i.precio)}</div>
        <button type="button" onclick="rmCarrito(${idx})" class="text-rose-400 text-lg px-1">×</button>
      </div>`;}).join('')}</div>` : `<p class="text-sm text-slate-400 text-center py-4">Agrega productos a la venta.</p>`}
    <div class="flex justify-between items-center text-lg font-bold border-t border-slate-100 pt-3 mb-3"><span>Total</span><span class="text-teal-600">${fmtMoney(total)}</span></div>
    ${field('Método de pago',`<select id="vMetodo" class="${inputCls}"><option>Efectivo</option><option>Nequi</option><option>Daviplata</option><option>Tarjeta</option><option>Transferencia</option></select>`)}
    ${DB.clientes.length?field('Cliente (opcional)',`<select id="vCliente" onchange="onVentaCliente()" class="${inputCls}"><option value="">Sin cliente</option>${clOpts}</select>`):''}
    <label class="flex items-center gap-2 mb-2 text-sm"><input type="checkbox" id="vFiado" onchange="onVentaCredito()"> Venta a crédito (queda como deuda del cliente)</label>
    <div id="vPlazoWrap" class="hidden mb-4">
      ${field('Plazo de pago (meses)',`<input id="vPlazo" type="number" min="1" step="1" value="1" oninput="actualizarPlazoInfo()" class="${inputCls}">`)}
      <p id="vPlazoInfo" class="text-[11px] text-slate-400 -mt-2"></p>
    </div>
    <button type="button" onclick="confirmVenta()" ${carritoV.length?'':'disabled'} class="w-full bg-teal-600 disabled:bg-slate-200 disabled:text-slate-500 disabled:cursor-not-allowed hover:bg-teal-700 text-white font-semibold py-3 rounded-xl">Registrar venta · ${fmtMoney(total)}</button>`;
}
function refreshVenta(){ const b=$('#modal .p-5'); if(b) b.innerHTML=ventaBody(); }
// Suma meses a una fecha ISO (para la fecha límite del crédito)
function addMonths(iso, m){ const d=new Date(iso+'T12:00:00'); d.setMonth(d.getMonth()+(+m||0)); return isoLocal(d); }
function onVentaCredito(){
  const on=$('#vFiado')?.checked; const w=$('#vPlazoWrap');
  if(w) w.classList.toggle('hidden',!on);
  if(on) onVentaCliente();
}
function onVentaCliente(){
  const c=getCliente($('#vCliente')?.value||'');
  const inp=$('#vPlazo');
  if(inp && c && c.plazoMeses) inp.value=c.plazoMeses; // trae el plazo configurado en el cliente
  actualizarPlazoInfo();
}
function actualizarPlazoInfo(){
  const el=$('#vPlazoInfo'); if(!el) return;
  const m=Math.max(1,+($('#vPlazo')?.value)||1);
  el.textContent='Fecha límite de pago: '+fmtDate(addMonths(todayISO(),m));
}
function onProdVentaChange(){
  const id=$('#vProd').value; const p=getProducto(id);
  $('#vPrecio').value = p ? p.precioVenta : '';
}
function addCarrito(){
  const id=$('#vProd').value; const cant=+$('#vCant').value||0;
  if(!id) return; if(cant<=0) return toast('Cantidad inválida','err');
  const p=getProducto(id); const yaEnCarrito=carritoV.filter(i=>i.prodId===id).reduce((s,i)=>s+i.cant,0);
  if(cant+yaEnCarrito>stockDe(p)) return toast(`Solo hay ${stockDe(p)} en stock`,'err');
  const precioTxt=$('#vPrecio').value;
  const precio = precioTxt!=='' ? +precioTxt : p.precioVenta;
  if(isNaN(precio)||precio<0) return toast('Precio inválido','err');
  const ex=carritoV.find(i=>i.prodId===id && i.precio===precio);
  if(ex) ex.cant+=cant; else carritoV.push({prodId:id,cant,precio,costo:p.precioCompra||0});
  refreshVenta();
}
function rmCarrito(idx){ carritoV.splice(idx,1); refreshVenta(); }
function confirmVenta(){
  if(!carritoV.length) return;
  const fiado=$('#vFiado')?.checked||false;
  const clienteId=$('#vCliente')?.value||'';
  if(fiado && !clienteId) return toast('Elige un cliente para la venta a crédito','err');
  const total=carritoV.reduce((s,i)=>s+i.cant*i.precio,0);
  const ganancia=carritoV.reduce((s,i)=>s+i.cant*(i.precio-(i.costo||0)),0);
  carritoV.forEach(i=>descontarStock(i.prodId,i.cant));
  const metodo = fiado ? 'Crédito' : (($('#vMetodo')&&$('#vMetodo').value)||'Efectivo');
  const plazoMeses = fiado ? Math.max(1,+($('#vPlazo')?.value)||getCliente(clienteId)?.plazoMeses||1) : null;
  const venceCredito = fiado ? addMonths(todayISO(), plazoMeses) : null;
  const venta={ id:uid(), consecutivo:DB.config.nextConsecutivo++, fecha:todayISO(), creado:Date.now(), items:carritoV.map(i=>({prodId:i.prodId,cant:i.cant,precio:i.precio,costo:i.costo})), total, ganancia, fiado, metodo, clienteId:clienteId||null, plazoMeses, venceCredito };
  DB.ventas.push(venta);
  if(fiado && clienteId){
    const c=getCliente(clienteId); c.saldo=(c.saldo||0)+total; c.movs=c.movs||[];
    const items = carritoV.map(i=>({nombre:getProducto(i.prodId)?.nombre||'(producto)', cant:i.cant}));
    c.movs.push({fecha:todayISO(),tipo:'fiado',monto:total,ventaId:venta.id,items,plazoMeses,vence:venceCredito});
  }
  store.save(); closeModal(); render(); toast('Venta registrada ✔');
  verVenta(venta.id); // muestra el recibo con opciones de WhatsApp/imprimir
}
function verVenta(id){

     <div class="space-y-2 mb-3">${v.items.map(i=>{const p=getProducto(i.prodId);return `<div class="flex justify-between text-sm"><span>${esc(p?.nombre||'(eliminado)')} × ${i.cant}</span><span>${fmtMoney(i.cant*i.precio)}</span></div>`;}).join('')}</div>

/* ----- Recibos ----- */
function reciboTexto(v){
  const cl = v.clienteId ? getCliente(v.clienteId) : null;
  const lineas = v.items.map(i=>{ const p=getProducto(i.prodId); return `• ${p?p.nombre:'(producto)'} x${i.cant} = ${fmtMoney(i.cant*i.precio)}`; });
  return `🧾 *${DB.config.negocio}*\nRecibo de venta #${fmtConsec(v.consecutivo)} — ${fmtDate(v.fecha)}${cl?`\nCliente: ${cl.nombre}${cl.negocio?`\nNegocio: ${cl.negocio}`:''}`:''}\n\n${lineas.join('\n')}\n\n*TOTAL: ${fmtMoney(v.total)}*\nPago: ${v.fiado?'Crédito':(v.metodo||'Efectivo')}${v.fiado&&v.venceCredito?`\nPagar antes del: ${fmtDate(v.venceCredito)}`:''}\n\n¡Gracias por su compra! 💊`;
}
function waVenta(id){
  const v=DB.ventas.find(x=>x.id===id); if(!v) return;
  const cl=v.clienteId? getCliente(v.clienteId):null;
  let tel=((cl&&cl.telefono)||'').replace(/\D/g,'');
  if(tel.length===10 && tel.startsWith('3')) tel='57'+tel; // celular colombiano
  window.open('https://wa.me/'+(tel||'')+'?text='+encodeURIComponent(reciboTexto(v)),'_blank');
}
function printVenta(id){
  const v=DB.ventas.find(x=>x.id===id); if(!v) return;
  const w=window.open('','_blank','width=380,height=600'); if(!w) return toast('Permite ventanas emergentes para imprimir','err');
  w.document.write(`<pre style="font:12px/1.5 monospace;white-space:pre-wrap;padding:12px">${esc(reciboTexto(v).replace(/\*/g,''))}</pre>`);
  w.document.close(); w.focus(); w.print();
}
function delVenta(id){
  if(!confirm('¿Anular esta venta? Se devolverá el stock.'))return;
  const v=DB.ventas.find(x=>x.id===id); if(!v)return;
  v.items.forEach(i=>agregarLote(i.prodId,i.cant,'',i.costo));
  if(v.fiado && v.clienteId){ const c=getCliente(v.clienteId); if(c){ c.saldo=Math.max(0,(c.saldo||0)-v.total); c.movs=c.movs||[]; c.movs.push({fecha:todayISO(),tipo:'anulacion',monto:v.total}); } }
  DB.ventas=DB.ventas.filter(x=>x.id!==id); store.save(); closeModal(); render(); toast('Venta anulada');
}

/* ---------- SUGERENCIA DE REPOSICIÓN ---------- */
function reposicionData(){
  const desde = isoLocal(new Date(Date.now() - 30*86400000));
  const vendidos = {};
  DB.ventas.filter(v=>v.fecha>=desde).forEach(v=>v.items.forEach(i=>{ vendidos[i.prodId]=(vendidos[i.prodId]||0)+i.cant; }));
  const items=[];
  DB.productos.forEach(p=>{
    const st=stockDe(p), v30=vendidos[p.id]||0;
    const diario=v30/30;
    const dias = diario>0 ? Math.round(st/diario) : null; // días que alcanza el stock al ritmo actual
    if(st<=DB.config.alertaStock || (dias!==null && dias<=7)){
      items.push({ p, st, v30, dias, sugerido: Math.max(1, Math.ceil(v30-st)) });
    }
  });
  items.sort((a,b)=>a.st-b.st);
  return items;
}
function pedidoTexto(items){
  return `📦 *Pedido — ${DB.config.negocio}*\n${fmtDate(todayISO())}\n\n${items.map(i=>`• ${i.p.nombre} — ${i.sugerido} ${i.p.unidad||'u'}`).join('\n')}\n\n¡Gracias!`;
}

/* ----- Cierre de caja (por defecto el día de hoy; acepta un rango de fechas) ----- */
function cierreDatos(desde,hasta){
  const hoy=todayISO();
  if(!desde&&!hasta){ desde=hoy; hasta=hoy; }         // sin rango: cierre del día
  else { desde=desde||'0000-01-01'; hasta=hasta||hoy; } // rango a medias: desde el inicio o hasta hoy
  const enRango=f=> f>=desde && f<=hasta;
  const vs=DB.ventas.filter(v=>enRango(v.fecha));
  const total=vs.reduce((s,v)=>s+v.total,0);
  const fiado=vs.filter(v=>v.fiado).reduce((s,v)=>s+v.total,0);
  const ganancia=vs.reduce((s,v)=>s+(v.ganancia||0),0);
  const porMetodo={};
  vs.filter(v=>!v.fiado).forEach(v=>{ const m=v.metodo||'Efectivo'; porMetodo[m]=(porMetodo[m]||0)+v.total; });
  const abonos=DB.clientes.reduce((s,c)=>s+(c.movs||[]).filter(m=>m.tipo==='abono'&&enRango(m.fecha)).reduce((x,m)=>x+m.monto,0),0);
  const compras=DB.compras.filter(c=>enRango(c.fecha)).reduce((s,c)=>s+c.total,0);
  const gastosHoy=DB.gastos.filter(g=>enRango(g.fecha)&&g.tipo==='gasto').reduce((s,g)=>s+g.monto,0);
  const ingresosHoy=DB.gastos.filter(g=>enRango(g.fecha)&&g.tipo==='ingreso').reduce((s,g)=>s+g.monto,0);
  const rango = desde===hasta ? fmtDate(desde) : desde==='0000-01-01' ? `hasta el ${fmtDate(hasta)}` : `${fmtDate(desde)} al ${fmtDate(hasta)}`;
  return { hoy, desde, hasta, rango, esHoy:desde===hoy&&hasta===hoy, n:vs.length, total, fiado, contado:total-fiado, porMetodo, ganancia, abonos, compras, gastosHoy, ingresosHoy, caja:(total-fiado)+abonos+ingresosHoy-gastosHoy };
}
function cierreTexto(desde,hasta){
  const d=cierreDatos(desde,hasta);
  const metodos=Object.entries(d.porMetodo).map(([m,v])=>`   - ${m}: ${fmtMoney(v)}`).join('\n');
  return `🧾 *${DB.config.negocio}* — Cierre de caja ${d.rango}\n\nVentas: ${d.n} por ${fmtMoney(d.total)}\n• De contado: ${fmtMoney(d.contado)}${metodos?`\n${metodos}`:''}\n• Crédito: ${fmtMoney(d.fiado)}\nAbonos recibidos: ${fmtMoney(d.abonos)}${d.ingresosHoy?`\nIngresos extra: ${fmtMoney(d.ingresosHoy)}`:''}\nGastos: ${fmtMoney(d.gastosHoy)}\n\n💵 Caja del periodo: ${fmtMoney(d.caja)}\n📈 Ganancia estimada: ${fmtMoney(d.ganancia)}\n🛒 Compras: ${fmtMoney(d.compras)}`;
}
function openCierre(desde,hasta){
  const d=cierreDatos(desde,hasta);
  const fila=(l,v,c)=>`<div class="flex justify-between text-sm py-2 border-b border-slate-50"><span class="text-slate-500">${l}</span><span class="font-semibold ${c||''}">${v}</span></div>`;
  const metodosHtml=Object.entries(d.porMetodo).map(([m,v])=>`<div class="flex justify-between text-xs py-1 pl-4 text-slate-400"><span>${esc(m)}</span><span>${fmtMoney(v)}</span></div>`).join('');
  openModal(`🧾 Cierre de caja — ${d.esHoy?'hoy':d.rango}`,
    fila(d.esHoy?'Ventas del día':'Ventas del periodo',`${d.n} venta(s) · ${fmtMoney(d.total)}`)
    +fila('De contado',fmtMoney(d.contado))
    +metodosHtml
    +fila('Crédito',fmtMoney(d.fiado),'text-amber-600')

    +(d.ingresosHoy?fila('Ingresos extra',fmtMoney(d.ingresosHoy),'text-teal-600'):'')
    +fila(d.esHoy?'Gastos del día':'Gastos del periodo',`−${fmtMoney(d.gastosHoy)}`,'text-rose-600')
    +fila(d.esHoy?'💵 Caja del día':'💵 Caja del periodo',fmtMoney(d.caja),'text-teal-700')
    +fila('Ganancia estimada',fmtMoney(d.ganancia),'text-brand-700')
    +fila(d.esHoy?'Compras del día':'Compras del periodo',fmtMoney(d.compras))
    +`${d.esHoy?`<button onclick="openGasto()" class="w-full mt-3 text-xs text-slate-500 border border-slate-200 rounded-xl py-2 hover:bg-slate-50">💸 Registrar un gasto de hoy</button>`:''}
     <div class="flex gap-2 mt-2">
       <button onclick="window.open('https://wa.me/?text='+encodeURIComponent(cierreTexto('${d.desde}','${d.hasta}')),'_blank')" class="flex-1 bg-teal-600 hover:bg-teal-700 text-white py-2.5 rounded-xl text-sm font-semibold">📲 WhatsApp</button>

     </div>`);

    agregarLote(p.id, i.cant, i.venc, i.costo, i.lote);

    return { prodId:p.id, cant:i.cant, costo:i.costo, venc:i.venc, lote:i.lote };
  });
  const numeroFactura=($('#cFactura')?.value||'').trim();
  const medioPago=credito?null:($('#cMedioPago')?.value||'Efectivo');
  const compra={ id:uid(), fecha:todayISO(), creado:Date.now(), proveedor, provId:provId||null, items, total, credito, plazoMeses, venceCredito, numeroFactura, factura:compraFacturaTmp.data?{...compraFacturaTmp}:null, medioPago };
  DB.compras.push(compra);
  if(credito && prov){
    prov.saldo=(prov.saldo||0)+total; prov.movs=prov.movs||[];
    const nombres=items.map(i=>`${getProducto(i.prodId)?.nombre||'(producto)'} x${i.cant}`);
    prov.movs.push({fecha:todayISO(),tipo:'credito',monto:total,compraId:compra.id,items:nombres,plazoMeses,vence:venceCredito,numeroFactura});
  }
  compraFacturaTmp={name:'',tipo:'',data:''};
  store.save(); closeModal(); render(); toast('Compra registrada ✔');
}

function delCompra(id){
  if(!confirm('¿Anular esta compra? Se descontará el stock ingresado.'))return;
  const c=DB.compras.find(x=>x.id===id); if(!c)return;
  c.items.forEach(i=>descontarStock(i.prodId,i.cant));
  if(c.credito && c.provId){ const p=getProveedor(c.provId); if(p){ p.saldo=Math.max(0,(p.saldo||0)-c.total); p.movs=p.movs||[]; p.movs.push({fecha:todayISO(),tipo:'anulacion',monto:c.total}); } }
  DB.compras=DB.compras.filter(x=>x.id!==id); store.save(); closeModal(); render(); toast('Compra anulada');
}

/* ---------- EXCEL: plantilla de cargue masivo, importación y reportes KPI ---------- */
function excelDisponible(){
  if(window.XLSX) return true;
  toast('La función de Excel no está disponible: abre la app con internet una vez para cargarla','err');
  return false;
}
function excelFechaISO(val){
  if(val===undefined||val===null||val==='') return '';
  if(val instanceof Date) return isoLocal(val);
  if(typeof val==='number'){
    const d = XLSX.SSF && XLSX.SSF.parse_date_code(val);
    return d ? `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}` : '';
  }
  const s = String(val).trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m) return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  return '';
}
function descargarPlantillaInventario(){
  if(!excelDisponible()) return;
  const headers = ['nombre','categoria','unidad','precioCompra','precioVenta','stockInicial','lote','vencimiento'];
  const ejemplo = ['ACETAMINOFEN 500 MG CJ X 20 TAB','Medicamento','u',1200,2000,50,'L2026A','2026-12-31'];
  const ws = XLSX.utils.aoa_to_sheet([headers, ejemplo]);
  ws['!cols'] = headers.map(h=>({wch:Math.max(14,h.length+4)}));
  const instrucciones = [
    ['Plantilla de carga masiva — '+DB.config.negocio],
    [''],
    ['Cómo usarla:'],
    ['1. Completa una fila por cada producto/lote en la hoja "Inventario".'],
    ['2. nombre: obligatorio. Si ya existe un producto con ese nombre, se actualiza; si no, se crea.'],
    ['3. categoria, unidad: opcionales.'],
    ['4. precioCompra, precioVenta: números sin puntos ni signos ($).'],
    ['5. stockInicial: cantidad del lote a ingresar (déjalo vacío o en 0 para solo crear/actualizar el producto sin stock).'],
    ['6. lote: código de lote (opcional).'],
    ['7. vencimiento: formato AAAA-MM-DD, ej: 2026-12-31 (opcional).'],
    ['8. Guarda el archivo y súbelo con el botón "Cargue masivo" en Ajustes.'],
  ];
  const wsI = XLSX.utils.aoa_to_sheet(instrucciones);
  wsI['!cols']=[{wch:75}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, wsI, 'Instrucciones');
  XLSX.utils.book_append_sheet(wb, ws, 'Inventario');
  XLSX.writeFile(wb, 'plantilla-cargue-inventario.xlsx');
}
function openCargueMasivo(){
  openModal('⬆️ Cargue masivo de inventario',
    `<p class="text-sm text-slate-500 mb-3">Sube un archivo .xlsx con la hoja "Inventario" (usa la <button type="button" onclick="descargarPlantillaInventario()" class="text-brand-700 underline">plantilla</button> si no la tienes). Los productos que ya existan (mismo nombre) se actualizan; si traen stockInicial mayor a 0 se agrega como lote nuevo.</p>
     <input type="file" id="cargueFile" accept=".xlsx,.xls" class="${inputCls} mb-3">
     <div id="cargueMsg" class="text-xs mb-2 min-h-[16px]"></div>
     <button onclick="procesarCargueMasivo()" class="w-full bg-brand hover:bg-brand-700 text-white font-semibold py-2.5 rounded-xl">Procesar archivo</button>`);
}
function procesarCargueMasivo(){
  if(!excelDisponible()) return;
  const inp = document.getElementById('cargueFile'); const msg = document.getElementById('cargueMsg');
  const f = inp && inp.files && inp.files[0];
  if(!f){ if(msg){ msg.style.color='#e11d48'; msg.textContent='Elige un archivo primero.'; } return; }
  const reader = new FileReader();
  reader.onload = (e) => {
    try{
      const wb = XLSX.read(e.target.result, { type:'array', cellDates:true });
      const sheetName = wb.SheetNames.find(n=>n.toLowerCase().includes('inventario')) || wb.SheetNames[0];
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { defval:'' });
      let creados=0, actualizados=0, lotesAgregados=0, saltados=0;
      rows.forEach(r=>{
        const nombre = String(r.nombre||r.Nombre||'').trim();
        if(!nombre){ saltados++; return; }
        let p = DB.productos.find(x=>x.nombre.toLowerCase()===nombre.toLowerCase());
        const categoria = String(r.categoria||r.Categoria||'').trim();
        const unidad = String(r.unidad||r.Unidad||'').trim();
        const precioCompra = +r.precioCompra||+r['P. compra']||0;
        const precioVenta = +r.precioVenta||+r['P. venta']||0;
        if(!p){
          p = { id:uid(), nombre, categoria, unidad:unidad||'u', precioCompra, precioVenta, lotes:[] };
          DB.productos.push(p); creados++;
        } else {
          if(categoria) p.categoria=categoria;
          if(unidad) p.unidad=unidad;
          if(precioCompra) p.precioCompra=precioCompra;
          if(precioVenta) p.precioVenta=precioVenta;
          actualizados++;
        }
        const stockInicial = +r.stockInicial||+r['Stock inicial']||0;
        if(stockInicial>0){
          const venc = excelFechaISO(r.vencimiento||r.Vencimiento);
          const lote = String(r.lote||r.Lote||'').trim();
          agregarLote(p.id, stockInicial, venc, precioCompra, lote);
          lotesAgregados++;
        }
      });
      store.save(); render();
      // render() reconstruye el modal, así que hay que volver a buscar el elemento del mensaje
      const msg2 = document.getElementById('cargueMsg');
      if(msg2){ msg2.style.color='#0d9488'; msg2.textContent=`Listo: ${creados} producto(s) creado(s), ${actualizados} actualizado(s), ${lotesAgregados} lote(s) agregado(s)${saltados?`, ${saltados} fila(s) sin nombre omitida(s)`:''}.`; }
      toast('Cargue masivo completado ✔');
    }catch(err){ console.error(err); if(msg){ msg.style.color='#e11d48'; msg.textContent='No se pudo leer el archivo. Verifica que tenga el formato de la plantilla.'; } }
  };
  reader.readAsArrayBuffer(f);
}
function exportInventarioExcel(){
  if(!excelDisponible()) return;
  const ps = DB.productos.slice().sort((a,b)=>a.nombre.localeCompare(b.nombre));
  const detalle = [];
  ps.forEach(p=>{
    const lotes = (p.lotes||[]).filter(l=>l.cantidad>0);
    if(!lotes.length){
      detalle.push({ Producto:p.nombre, Categoría:p.categoria||'', Unidad:p.unidad||'u', Lote:'', Cantidad:0, Vencimiento:'', 'Precio compra':p.precioCompra||0, 'Precio venta':p.precioVenta||0, 'Valor venta':0 });
    } else {
      lotes.forEach(l=> detalle.push({ Producto:p.nombre, Categoría:p.categoria||'', Unidad:p.unidad||'u', Lote:l.lote||'', Cantidad:l.cantidad, Vencimiento:l.venc||'', 'Precio compra':p.precioCompra||0, 'Precio venta':p.precioVenta||0, 'Valor venta':l.cantidad*(p.precioVenta||0) }));
    }
  });
  const valorVenta = ps.reduce((s,p)=>s+stockDe(p)*(p.precioVenta||0),0);
  const valorCosto = ps.reduce((s,p)=>s+stockDe(p)*(p.precioCompra||0),0);
  const unidadesTotales = ps.reduce((s,p)=>s+stockDe(p),0);
  const bajoStock = ps.filter(p=>stockDe(p)<=DB.config.alertaStock).length;
  let vencidos=0, porVencer=0;
  ps.forEach(p=>(p.lotes||[]).forEach(l=>{ if(!l.venc||!(l.cantidad>0)) return; const d=daysUntil(l.venc); if(d<0) vencidos++; else if(d<=DB.config.alertaVencimiento) porVencer++; }));
  const kpi = [
    ['Reporte de Inventario', DB.config.negocio],
    ['Generado', new Date().toLocaleString('es-CO')],
    [''],
    ['Indicador','Valor'],
    ['Productos', ps.length],
    ['Unidades totales en stock', unidadesTotales],
    ['Valor inventario (a precio de venta)', valorVenta],
    ['Valor inventario (a costo)', valorCosto],
    ['Productos con stock bajo (≤'+DB.config.alertaStock+')', bajoStock],
    ['Lotes vencidos', vencidos],
    ['Lotes por vencer (≤'+DB.config.alertaVencimiento+' días)', porVencer],
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(kpi), 'KPI');
  const wsD = XLSX.utils.json_to_sheet(detalle);
  wsD['!cols'] = [{wch:32},{wch:16},{wch:8},{wch:12},{wch:10},{wch:12},{wch:12},{wch:12},{wch:12}];
  XLSX.utils.book_append_sheet(wb, wsD, 'Detalle');
  XLSX.writeFile(wb, `inventario-${todayISO()}.xlsx`);
}
function exportVentasExcel(){
  if(!excelDisponible()) return;
  const st = listFilters['listVentas']||{desde:'',hasta:''};
  let vs = DB.ventas.slice();
  if(st.desde) vs = vs.filter(v=>v.fecha>=st.desde);
  if(st.hasta) vs = vs.filter(v=>v.fecha<=st.hasta);
  vs.sort((a,b)=> a.fecha<b.fecha?-1:a.fecha>b.fecha?1:(a.creado||0)-(b.creado||0));
  const detalle = vs.map(v=>({
    'N°':fmtConsec(v.consecutivo), Fecha:v.fecha, Cliente:v.clienteId?(getCliente(v.clienteId)?.nombre||''):'',
    'Método':v.fiado?'Crédito':(v.metodo||'Efectivo'), Productos:v.items.map(i=>`${getProducto(i.prodId)?.nombre||'(eliminado)'} x${i.cant}`).join(', '),
    Total:v.total, Ganancia:v.ganancia||0
  }));
  const totalVentas = vs.reduce((s,v)=>s+v.total,0);
  const totalGanancia = vs.reduce((s,v)=>s+(v.ganancia||0),0);
  const totalFiado = vs.filter(v=>v.fiado).reduce((s,v)=>s+v.total,0);
  const porMetodo={};
  vs.filter(v=>!v.fiado).forEach(v=>{ const m=v.metodo||'Efectivo'; porMetodo[m]=(porMetodo[m]||0)+v.total; });
  const kpi = [
    ['Reporte de Ventas', DB.config.negocio],
    ['Generado', new Date().toLocaleString('es-CO')],
    ['Rango', (st.desde||'inicio')+' a '+(st.hasta||'hoy')],
    [''],
    ['Indicador','Valor'],
    ['Ventas', vs.length],
    ['Total vendido', totalVentas],
    ['Ganancia estimada', totalGanancia],
    ['Total a crédito', totalFiado],
    ['Ticket promedio', vs.length?Math.round(totalVentas/vs.length):0],
    ...Object.entries(porMetodo).map(([m,v])=>[`Ventas ${m}`, v]),
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(kpi), 'KPI');
  const wsD = XLSX.utils.json_to_sheet(detalle);
  wsD['!cols']=[{wch:6},{wch:12},{wch:22},{wch:12},{wch:50},{wch:12},{wch:12}];
  XLSX.utils.book_append_sheet(wb, wsD, 'Detalle');
  XLSX.writeFile(wb, `ventas-${todayISO()}.xlsx`);
}

function exportData(){

function importData(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange=e=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader();
    r.onload=()=>{ try{ const d=JSON.parse(r.result); Object.assign(DB,d); store.migrar(DB); store.save(); closeModal(); render(); toast('Datos importados'); }catch{ toast('Archivo inválido','err'); } };
    r.readAsText(f); };
  inp.click();
}
function resetData(){ if(!confirm('Esto borrará TODOS los datos. ¿Continuar?'))return; localStorage.removeItem(store.key); location.reload(); }

// Aviso al abrir la app si hay cobros/pagos con fecha límite a 5 días o menos
setTimeout(()=>{
  const n=creditosPorVencer().length;
  if(n) toast(`🔔 Tienes ${n} crédito(s) por vencer — míralos en Inicio`);
}, 900);
// PWA: cachea la app para funcionar sin internet
if('serviceWorker' in navigator && location.protocol==='https:'){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
// Sincronización automática:
// - al ocultar/minimizar la app: sube de inmediato cualquier guardado pendiente
// - al volver a la app: trae en silencio lo último de la nube (por si el tiempo real se perdió)
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState==='hidden' && cloud.user && cloud.pushTimer){ clearTimeout(cloud.pushTimer); cloud.pushTimer=null; cloud.push(true); }
  if(document.visibilityState==='visible' && cloud.user && cloud.status!=='sync'){ cloud.pull(true); }
});
